<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="560" fill="#ffffff"/>

  <text x="40" y="44" font-size="22" font-weight="700" fill="#1a3c5e">Attack tree</text>
  <text x="40" y="68" font-size="13.5" fill="#555555">Attacker goal: obtain user data. Sneaker marketplace app.</text>
  <line x1="40" y1="84" x2="720" y2="84" stroke="#c99a2e" stroke-width="2"/>

  <!-- edges (drawn first, behind nodes) -->
  <line x1="380" y1="176" x2="220" y2="248" stroke="#1a3c5e" stroke-width="1.8"/>
  <line x1="380" y1="176" x2="540" y2="248" stroke="#1a3c5e" stroke-width="1.8"/>
  <line x1="220" y1="310" x2="220" y2="392" stroke="#8a99a8" stroke-width="1.8" stroke-dasharray="6 4"/>
  <line x1="540" y1="310" x2="540" y2="392" stroke="#8a99a8" stroke-width="1.8" stroke-dasharray="6 4"/>

  <!-- OR gate label -->
  <rect x="356" y="196" width="48" height="22" rx="11" fill="#ffffff" stroke="#555555" stroke-width="1.2"/>
  <text x="380" y="211" font-size="12" font-weight="700" fill="#555555" text-anchor="middle">OR</text>

  <!-- root: attacker goal -->
  <rect x="280" y="118" width="200" height="58" rx="6" fill="#1a3c5e"/>
  <text x="380" y="145" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Obtain user data</text>
  <text x="380" y="164" font-size="11" fill="#c3d0dd" text-anchor="middle">attacker goal</text>

  <!-- branch nodes: attack methods -->
  <rect x="120" y="250" width="200" height="58" rx="6" fill="#c99a2e"/>
  <text x="220" y="277" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">SQL injection</text>
  <text x="220" y="295" font-size="10.5" fill="#fbf3e2" text-anchor="middle">attack method</text>

  <rect x="440" y="250" width="200" height="58" rx="6" fill="#c99a2e"/>
  <text x="540" y="277" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Session hijacking</text>
  <text x="540" y="295" font-size="10.5" fill="#fbf3e2" text-anchor="middle">attack method</text>

  <!-- enabled-by labels -->
  <text x="234" y="356" font-size="10.5" fill="#777777" text-anchor="middle" font-style="italic">enabled by</text>
  <text x="554" y="356" font-size="10.5" fill="#777777" text-anchor="middle" font-style="italic">enabled by</text>

  <!-- leaf nodes: enabling weaknesses -->
  <rect x="120" y="394" width="200" height="62" rx="6" fill="#f7f9fb" stroke="#b23b3b" stroke-width="2"/>
  <text x="220" y="419" font-size="13.5" font-weight="600" fill="#1a3c5e" text-anchor="middle">Lack of prepared</text>
  <text x="220" y="437" font-size="13.5" font-weight="600" fill="#1a3c5e" text-anchor="middle">statements</text>

  <rect x="440" y="394" width="200" height="62" rx="6" fill="#f7f9fb" stroke="#b23b3b" stroke-width="2"/>
  <text x="540" y="428" font-size="13.5" font-weight="600" fill="#1a3c5e" text-anchor="middle">Weak login credentials</text>

  <!-- legend -->
  <rect x="120" y="496" width="16" height="16" rx="3" fill="#1a3c5e"/>
  <text x="144" y="509" font-size="11.5" fill="#333333">Goal</text>
  <rect x="210" y="496" width="16" height="16" rx="3" fill="#c99a2e"/>
  <text x="234" y="509" font-size="11.5" fill="#333333">Attack method</text>
  <rect x="360" y="496" width="16" height="16" rx="3" fill="#f7f9fb" stroke="#b23b3b" stroke-width="2"/>
  <text x="384" y="509" font-size="11.5" fill="#333333">Enabling weakness (maps to Stage V vulnerabilities)</text>
</svg>